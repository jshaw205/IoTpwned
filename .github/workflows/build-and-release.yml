name: Build & Release

# Runs the test suite and a PyInstaller build on every OS (matrix). On a version
# tag (vX.Y.Z) it additionally attaches the three OS binaries to a GitHub Release.
#
# PyInstaller can't cross-compile, so each OS's binary is built on its own runner.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: iotpwned-linux-x64
            binary: dist/iotpwned
          - os: macos-latest
            asset: iotpwned-macos-arm64
            binary: dist/iotpwned
          - os: windows-latest
            asset: iotpwned-windows-x64.exe
            binary: dist/iotpwned.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install (with build + dev extras)
        run: python -m pip install -e ".[build,dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build single-file executable
        run: python packaging/build.py --clean

      - name: Smoke-test the binary
        shell: bash
        run: |
          "${{ matrix.binary }}" --version
          "${{ matrix.binary }}" --help > /dev/null

      - name: Stage named artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Attach binaries to the release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/edit releases
    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # download-artifact v4 nests each artifact in its own subdir.
          files=(artifacts/*/*)
          echo "Attaching: ${files[*]}"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "IoTpwned ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
